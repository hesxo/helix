apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: helix
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      # In-cluster Grafana MUST use Service DNS — never http://localhost:9090 (localhost = Grafana pod only).
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: false
        jsonData:
          maxLines: 1000
