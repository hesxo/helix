apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: helix
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: helix
        orgId: 1
        folder: Helix
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/helix
