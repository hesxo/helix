name: Helix CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api-gateway-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/api-gateway
        run: pnpm install --frozen-lockfile

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.69.3

      - name: Run tests
        run: make test-api

      - name: Build Docker image
        run: make build-api

      - name: Scan filesystem
        run: make scan-api-fs

      - name: Scan Docker image
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 helix/api-gateway:0.1.0

  user-service-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helix
          POSTGRES_USER: helix
          POSTGRES_PASSWORD: helix
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U helix -d helix"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://helix:helix@localhost:5432/helix?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/user-service
        run: pnpm install --frozen-lockfile

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.69.3

      - name: Run tests
        run: make test-user

      - name: Build Docker image
        run: make build-user

      - name: Scan filesystem
        run: make scan-user-fs

      - name: Scan Docker image
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 helix/user-service:0.1.0

  order-service-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: helix
          POSTGRES_USER: helix
          POSTGRES_PASSWORD: helix
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U helix -d helix"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://helix:helix@localhost:5432/helix?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: apps/order-service
        run: pnpm install --frozen-lockfile

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.69.3

      - name: Run tests
        run: make test-order

      - name: Build Docker image
        run: make build-order

      - name: Scan filesystem
        run: make scan-order-fs

      - name: Scan Docker image
        run: trivy image --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 helix/order-service:0.1.0
